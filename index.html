<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATCO Trainer v2 // LPS SR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* Light theme — white background, readable green accent, high-contrast buttons */
    --bg: #f4f7f5; --panel: #ffffff; --panel-2: #eef3f0;
    --border: #cdddd4; --border-bright: #9fb8aa;
    /* readable emerald for text/accents on white */
    --green: #07804b; --green-strong: #0a9d5c; --green-dim: #4a9a72; --green-bg: #e3f6ec;
    --amber: #b06a00; --amber-bg: #fdf2dd;
    --red: #c62f2f; --red-bg: #fdeaea;
    --text: #16221c; --text-dim: #4f6359;
    --text-faint: #87998f;
    --shadow: 0 1px 2px rgba(16,40,28,0.06), 0 2px 8px rgba(16,40,28,0.06);
    --shadow-btn: 0 1px 0 rgba(16,40,28,0.08), 0 2px 6px rgba(10,157,92,0.18);
    --mono: 'JetBrains Mono', ui-monospace, monospace;
    --display: 'Space Grotesk', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 14px; min-height: 100vh; overflow-x: hidden; }
  /* subtle light grid texture instead of dark scanlines */
  body::before { content:''; position:fixed; inset:0; pointer-events:none; z-index:1;
    background: radial-gradient(ellipse at top, #c9f0db40 0%, transparent 55%),
                linear-gradient(#0a9d5c08 1px, transparent 1px),
                linear-gradient(90deg, #0a9d5c08 1px, transparent 1px);
    background-size: 100% 100%, 28px 28px, 28px 28px; }
  .app { position:relative; z-index:3; max-width:1040px; margin:0 auto; padding:24px 20px 80px; }

  header { display:flex; align-items:center; justify-content:space-between; border:1px solid var(--border); background:var(--panel); padding:14px 18px; margin-bottom:20px; position:relative; border-radius:8px; box-shadow:var(--shadow); }
  header::before { content:''; position:absolute; top:-1px; left:-1px; width:12px; height:12px; border-top:3px solid var(--green-strong); border-left:3px solid var(--green-strong); border-radius:4px 0 0 0; }
  header::after { content:''; position:absolute; bottom:-1px; right:-1px; width:12px; height:12px; border-bottom:3px solid var(--green-strong); border-right:3px solid var(--green-strong); border-radius:0 0 4px 0; }
  .brand { display:flex; align-items:baseline; gap:12px; }
  .brand-mark { color:var(--green); font-weight:800; letter-spacing:0.18em; font-size:13px; }
  .brand-sub { color:var(--text-faint); font-size:11px; letter-spacing:0.2em; }
  .clock { color:var(--green-dim); font-size:12px; letter-spacing:0.15em; font-weight:500; }

  /* TABS — clearly card-like, active tab is a solid filled button */
  .tabs { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:20px; }
  .tab { background:var(--panel); border:1.5px solid var(--border); color:var(--text-dim); padding:14px 14px; cursor:pointer; text-align:left; font-family:var(--mono); font-size:12px; letter-spacing:0.12em; transition:all 0.15s; border-radius:8px; box-shadow:var(--shadow); }
  .tab:hover { border-color:var(--green-strong); color:var(--text); transform:translateY(-1px); box-shadow:0 3px 10px rgba(10,157,92,0.16); }
  .tab.active { background:var(--green-strong); border-color:var(--green-strong); color:#ffffff; box-shadow:0 3px 12px rgba(10,157,92,0.32); }
  .tab .tab-num { display:block; font-size:10px; color:var(--text-faint); margin-bottom:4px; }
  .tab.active .tab-num { color:#d6f5e6; }
  .tab .tab-label { font-weight:700; }

  .panel { background:var(--panel); border:1px solid var(--border); border-radius:8px; box-shadow:var(--shadow); overflow:hidden; }
  .panel-head { display:flex; justify-content:space-between; align-items:center; padding:12px 18px; border-bottom:1px solid var(--border); background:var(--panel-2); font-size:11px; letter-spacing:0.18em; color:var(--text-dim); }
  .stats { display:flex; gap:18px; }
  .stat { display:flex; gap:6px; align-items:baseline; }
  .stat-label { color:var(--text-faint); font-size:10px; }
  .stat-val { color:var(--green); font-weight:700; }
  .stat-val.amber { color:var(--amber); }
  .stat-val.red { color:var(--red); }

  .qcard { padding:28px; min-height:340px; }
  .qmeta { font-size:10px; letter-spacing:0.25em; color:var(--text-faint); margin-bottom:18px; }
  .qmeta .sep { margin:0 10px; }
  .aircraft-display { display:grid; grid-template-columns:380px 1fr; gap:24px; align-items:stretch; margin-bottom:18px; }
  .aircraft-photo { background:var(--panel-2); border:1px solid var(--border); position:relative; aspect-ratio:16/10; overflow:hidden; border-radius:6px; }
  .aircraft-photo img { width:100%; height:100%; object-fit:cover; }
  .aircraft-photo::after { content:''; position:absolute; inset:0; pointer-events:none;
    background: linear-gradient(180deg, transparent 80%, #00000055 100%); }
  .photo-corner { position:absolute; bottom:8px; left:10px; right:10px; z-index:2; color:#ffffff; font-size:9px; letter-spacing:0.15em; display:flex; justify-content:space-between; text-shadow:0 1px 3px rgba(0,0,0,0.7); }
  .photo-loading { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:var(--green-dim); font-size:11px; letter-spacing:0.2em; animation:pulse-loading 1.4s infinite; }
  .aircraft-info-side { display:flex; flex-direction:column; gap:10px; }
  .ac-target { font-family:var(--display); font-size:18px; color:var(--text); font-weight:700; border-bottom:1px solid var(--border); padding-bottom:10px; margin-bottom:4px; }
  .ac-target small { display:block; font-family:var(--mono); font-size:10px; color:var(--text-faint); letter-spacing:0.15em; font-weight:400; margin-bottom:4px; }
  .ac-row { display:flex; gap:8px; flex-wrap:wrap; font-size:11px; }
  .ac-chip { background:var(--panel-2); border:1px solid var(--border); padding:6px 10px; letter-spacing:0.08em; color:var(--text-dim); border-radius:5px; }
  .ac-chip strong { color:var(--green); margin-right:6px; font-weight:700; }

  .hint-row { margin:14px 0 6px; display:flex; gap:8px; align-items:center; flex-wrap:wrap; padding:10px 14px; background:var(--amber-bg); border-left:4px solid var(--amber); min-height:48px; border-radius:0 6px 6px 0; }
  .hint-row.empty { background:var(--panel-2); border-color:var(--border); }
  .hint-label { color:var(--amber); font-size:10px; letter-spacing:0.18em; font-weight:700; }
  .hint-row.empty .hint-label { color:var(--text-faint); }
  .hint-text { color:var(--text); font-size:12px; flex:1; }
  .hint-row.empty .hint-text { color:var(--text-faint); font-style:italic; }

  /* HINT button — clearly an amber filled action */
  .btn-hint { background:var(--amber); border:1.5px solid var(--amber); color:#ffffff; padding:7px 16px; font-family:var(--mono); font-size:11px; letter-spacing:0.15em; cursor:pointer; font-weight:700; border-radius:6px; box-shadow:0 2px 6px rgba(176,106,0,0.25); transition:all 0.12s; }
  .btn-hint:hover { background:#9a5d00; transform:translateY(-1px); }
  .btn-hint:disabled { opacity:1; cursor:not-allowed; background:var(--panel-2); border-color:var(--border); color:var(--text-faint); box-shadow:none; transform:none; }

  .big-prompt { font-family:var(--display); font-size:64px; font-weight:700; color:var(--green); letter-spacing:0.04em; text-align:center; margin:32px 0 14px; line-height:1; }
  .big-prompt.small { font-size:38px; }
  .prompt-hint { text-align:center; color:var(--text-faint); font-size:11px; letter-spacing:0.2em; margin-bottom:14px; }

  /* INPUT — white field, dark green text, clear border */
  .input-row { display:flex; gap:10px; margin-top:18px; }
  .input-row input { flex:1; background:#ffffff; border:2px solid var(--border-bright); color:var(--green); padding:16px 18px; font-family:var(--mono); font-size:18px; letter-spacing:0.08em; outline:none; text-transform:uppercase; border-radius:8px; font-weight:700; transition:border-color 0.12s, box-shadow 0.12s; }
  .input-row input:focus { border-color:var(--green-strong); box-shadow:0 0 0 3px rgba(10,157,92,0.18); }
  .input-row input::placeholder { color:var(--text-faint); text-transform:none; letter-spacing:0.1em; font-weight:400; }

  /* PRIMARY button — solid green, white text, obviously clickable */
  .btn { background:var(--green-strong); border:1.5px solid var(--green-strong); color:#ffffff; padding:0 24px; font-family:var(--mono); font-size:12px; letter-spacing:0.18em; font-weight:700; cursor:pointer; transition:all 0.12s; border-radius:8px; box-shadow:var(--shadow-btn); }
  .btn:hover { background:var(--green); border-color:var(--green); transform:translateY(-1px); box-shadow:0 4px 12px rgba(10,157,92,0.3); }
  .btn:active { transform:translateY(0); }
  /* SECONDARY (ghost) button — white with strong border, clearly a button */
  .btn.ghost { background:#ffffff; border:1.5px solid var(--border-bright); color:var(--text-dim); box-shadow:var(--shadow); }
  .btn.ghost:hover { background:var(--panel-2); border-color:var(--green-strong); color:var(--green); transform:translateY(-1px); }

  .feedback { margin-top:16px; padding:0; display:none; }
  .feedback.show { display:block; }
  .feedback-banner { padding:12px 16px; border-left:4px solid; font-size:13px; display:flex; align-items:center; justify-content:space-between; gap:16px; border-radius:0 6px 6px 0; font-weight:600; }
  .feedback.ok .feedback-banner { background:var(--green-bg); border-color:var(--green-strong); color:var(--green); }
  .feedback.no .feedback-banner { background:var(--red-bg); border-color:var(--red); color:var(--red); }
  .feedback .answer { font-family:var(--display); font-size:16px; font-weight:700; }

  .reveal { background:var(--panel-2); border:1px solid var(--border); border-top:none; padding:18px 20px; border-radius:0 0 8px 8px; }
  .reveal-title { font-family:var(--display); font-size:22px; color:var(--green); font-weight:700; margin-bottom:4px; letter-spacing:0.01em; }
  .reveal-sub { font-size:11px; letter-spacing:0.15em; color:var(--text-faint); margin-bottom:14px; }
  .reveal-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(170px, 1fr)); gap:8px 14px; font-size:12px; }
  .reveal-grid .item { display:flex; flex-direction:column; gap:2px; padding:7px 0; border-bottom:1px dashed var(--border); }
  .reveal-grid .item-label { font-size:9px; letter-spacing:0.18em; color:var(--text-faint); }
  .reveal-grid .item-val { color:var(--text); }
  .reveal-grid .item-val strong { color:var(--green); font-weight:700; }
  .reveal-ops { margin-top:14px; padding-top:12px; border-top:1px solid var(--border); font-size:11px; color:var(--text-dim); line-height:1.6; }
  .reveal-ops strong { color:var(--amber); display:block; font-size:9px; letter-spacing:0.2em; margin-bottom:4px; }

  .controls { display:flex; gap:8px; padding:12px 18px; border-top:1px solid var(--border); background:var(--panel-2); justify-content:space-between; align-items:center; flex-wrap:wrap; }
  .controls-left { display:flex; gap:8px; flex-wrap:wrap; }
  .controls-right { display:flex; gap:8px; }

  /* FILTER chips — clearly toggle buttons; active = filled green */
  .filter-chip { background:#ffffff; border:1.5px solid var(--border-bright); color:var(--text-dim); padding:7px 12px; font-family:var(--mono); font-size:10px; letter-spacing:0.12em; cursor:pointer; white-space:nowrap; border-radius:20px; font-weight:600; transition:all 0.12s; }
  .filter-chip.on { border-color:var(--green-strong); color:#ffffff; background:var(--green-strong); box-shadow:0 2px 6px rgba(10,157,92,0.22); }
  .filter-chip:hover { border-color:var(--green-strong); color:var(--green); }
  .filter-chip.on:hover { color:#ffffff; }

  .weak-section { margin-top:20px; background:var(--panel); border:1px solid var(--border); padding:14px 18px; border-radius:8px; box-shadow:var(--shadow); }
  .weak-title { font-size:11px; letter-spacing:0.2em; color:var(--amber); margin-bottom:10px; display:flex; gap:10px; align-items:center; font-weight:700; }
  .weak-title::before { content:'!'; display:inline-flex; align-items:center; justify-content:center; width:18px; height:18px; border-radius:50%; background:var(--amber); color:#ffffff; font-weight:700; }
  .weak-list { display:flex; flex-wrap:wrap; gap:6px; }
  .weak-item { font-size:11px; padding:5px 9px; background:var(--amber-bg); border:1px solid var(--amber); color:var(--amber); letter-spacing:0.05em; border-radius:5px; font-weight:600; }
  .weak-empty { color:var(--text-faint); font-size:11px; }

  .session-done { padding:40px 28px; text-align:center; }
  .session-done h2 { font-family:var(--display); font-size:28px; color:var(--green); margin-bottom:8px; letter-spacing:0.02em; }
  .session-done p { color:var(--text-dim); margin-bottom:24px; }
  .score-big { font-size:72px; color:var(--green); font-weight:800; font-family:var(--mono); }

  /* ===== MAP / WAYPOINT MODE ===== */
  .map-prompt { text-align:center; margin-bottom:8px; }
  .map-prompt .mp-label { font-size:11px; letter-spacing:0.2em; color:var(--text-faint); display:block; margin-bottom:6px; }
  .map-prompt .mp-name { font-family:var(--display); font-size:46px; font-weight:800; color:var(--green); letter-spacing:0.06em; line-height:1; }
  .map-prompt .mp-sub { font-size:11px; letter-spacing:0.12em; color:var(--text-dim); margin-top:8px; }
  .map-prompt .mp-sub .tg { display:inline-block; background:var(--green-bg); border:1px solid var(--green-strong); color:var(--green); padding:2px 8px; border-radius:4px; margin:0 3px; font-weight:700; }
  .map-wrap { position:relative; width:100%; background:#fbfdfc; border:1px solid var(--border); border-radius:8px; overflow:hidden; margin-top:6px; box-shadow:inset 0 0 0 1px #ffffff; }
  .map-wrap svg { width:100%; height:auto; display:block; touch-action:manipulation; }
  /* dot states */
  .wp-dot { cursor:pointer; transition:r 0.1s, fill 0.1s; }
  .wp-hit { cursor:pointer; }
  .wp-dot.cand { fill:#ffffff; stroke:var(--green-strong); stroke-width:2; }
  .wp-dot.cand:hover { fill:var(--green-bg); }
  .wp-dot.nav.cand { fill:#fff4e0; stroke:var(--amber); }
  .wp-dot.correct { fill:var(--green-strong); stroke:var(--green-strong); }
  .wp-dot.wrong { fill:var(--red); stroke:var(--red); }
  .wp-dot.reveal-correct { fill:var(--green-strong); stroke:#063; stroke-width:2.5; }
  .wp-dot.other { fill:#1a1a1a; stroke:#1a1a1a; stroke-width:1; }
  .wp-anchor { fill:var(--text-dim); }
  .wp-anchor-label { fill:var(--text-dim); font-family:var(--mono); font-size:9px; font-weight:700; letter-spacing:0.1em; }
  .wp-city { fill:var(--amber); }
  .wp-label-reveal { fill:var(--green); font-family:var(--mono); font-size:8.5px; font-weight:800; pointer-events:none; }
  .wp-label-other { fill:#1a1a1a; font-family:var(--mono); font-size:9px; font-weight:700; pointer-events:none; letter-spacing:0.03em; paint-order:stroke; stroke:#fbfdfc; stroke-width:2.5px; stroke-linejoin:round; }
  .sec-line { fill:none; stroke:#6b7d74; stroke-width:1.2; stroke-dasharray:6 4; opacity:0.7; }
  .sec-label { fill:#5b6d64; font-family:var(--mono); font-size:11px; font-weight:800; letter-spacing:0.25em; opacity:0.55; pointer-events:none; }
  .map-legend { display:flex; gap:14px; flex-wrap:wrap; justify-content:center; margin-top:10px; font-size:10px; color:var(--text-dim); letter-spacing:0.05em; }
  .map-legend span { display:inline-flex; align-items:center; gap:5px; }
  .lg-pt::before { content:''; width:11px; height:11px; border-radius:50%; background:#fff; border:2px solid var(--green-strong); display:inline-block; }
  .lg-nav::before { content:''; width:11px; height:11px; border-radius:50%; background:#fff4e0; border:2px solid var(--amber); display:inline-block; }
  .lg-city::before { content:'◆'; color:var(--amber); font-size:12px; }
  .lg-fir::before { content:''; width:14px; height:0; border-top:2px dashed var(--border-bright); display:inline-block; }
  .lg-sec::before { content:''; width:14px; height:0; border-top:1.5px dashed #6b7d74; display:inline-block; }
  .lg-other::before { content:''; width:9px; height:9px; border-radius:50%; background:#1a1a1a; display:inline-block; }
  .map-difficulty { font-size:10px; letter-spacing:0.12em; color:var(--text-faint); text-align:center; margin-top:4px; }

  /* ===== STUDY / EXPLORE MODE ===== */
  .wp-dot.s-W { fill:#0a9d5c; stroke:#06633a; stroke-width:1.2; }
  .wp-dot.s-C { fill:#e08a1e; stroke:#8a5300; stroke-width:1.2; }
  .wp-dot.s-E { fill:#3b82c4; stroke:#22557f; stroke-width:1.2; }
  .wp-dot.s-sel { stroke:#16221c; stroke-width:3.5; }
  .wp-label-study { fill:#16221c; font-family:var(--mono); font-size:8px; font-weight:700; pointer-events:none; letter-spacing:0.02em; paint-order:stroke; stroke:#fbfdfc; stroke-width:2.4px; stroke-linejoin:round; }
  .lg-sw::before { content:''; width:11px; height:11px; border-radius:50%; background:#0a9d5c; display:inline-block; }
  .lg-sc::before { content:''; width:11px; height:11px; border-radius:50%; background:#e08a1e; display:inline-block; }
  .lg-se::before { content:''; width:11px; height:11px; border-radius:50%; background:#3b82c4; display:inline-block; }
  .study-detail { margin-top:14px; background:var(--panel-2); border:1px solid var(--border); border-radius:8px; padding:16px 18px; min-height:96px; }
  .study-detail.empty { color:var(--text-faint); font-style:italic; display:flex; align-items:center; justify-content:center; text-align:center; letter-spacing:0.08em; }
  .study-tip { font-size:10px; letter-spacing:0.1em; color:var(--text-faint); text-align:center; margin-top:6px; }

  @media (max-width:760px) {
    .aircraft-display { grid-template-columns:1fr; }
    .big-prompt { font-size:44px; }
    .big-prompt.small { font-size:28px; }
    .tab .tab-label { font-size:11px; }
    .qcard { padding:20px 16px; }
    .tabs { grid-template-columns:repeat(2,1fr); }
    .map-prompt .mp-name { font-size:34px; }
  }
  @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
  .blink { animation:blink 1.4s infinite; }
  @keyframes pulse-loading { 0%,100% { opacity:0.4; } 50% { opacity:1; } }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand">
      <span class="brand-mark">▲ ATCO TRAINER</span>
      <span class="brand-sub">LPS SR // TRAINING MODULE v2</span>
    </div>
    <div class="clock"><span class="blink">●</span> <span id="clock">--:--:-- UTC</span></div>
  </header>
  <div class="tabs">
    <button class="tab active" data-mode="aircraft"><span class="tab-num">MOD 01</span><span class="tab-label">AIRCRAFT TYPE</span></button>
    <button class="tab" data-mode="airport"><span class="tab-num">MOD 02</span><span class="tab-label">AIRPORTS / ICAO</span></button>
    <button class="tab" data-mode="callsign"><span class="tab-num">MOD 03</span><span class="tab-label">CALLSIGNS</span></button>
    <button class="tab" data-mode="waypoint"><span class="tab-num">MOD 04</span><span class="tab-label">FRA BODY / MAPA</span></button>
  </div>
  <div class="panel">
    <div class="panel-head">
      <div><span id="mode-label">AIRCRAFT TYPE</span> <span style="margin-left:10px;color:var(--text-faint)">QUESTION <span id="qnum">1</span> / <span id="qtotal">--</span></span></div>
      <div class="stats">
        <div class="stat"><span class="stat-label">CORRECT</span><span class="stat-val" id="stat-correct">0</span></div>
        <div class="stat"><span class="stat-label">WRONG</span><span class="stat-val red" id="stat-wrong">0</span></div>
        <div class="stat"><span class="stat-label">STREAK</span><span class="stat-val amber" id="stat-streak">0</span></div>
      </div>
    </div>
    <div id="qcard" class="qcard"></div>
    <div class="controls">
      <div class="controls-left" id="filters"></div>
      <div class="controls-right">
        <button class="btn ghost" id="btn-skip">SKIP →</button>
        <button class="btn ghost" id="btn-reset">RESET</button>
      </div>
    </div>
  </div>
  <div class="weak-section">
    <div class="weak-title">WEAK SPOTS (3+ wrong attempts)</div>
    <div class="weak-list" id="weak-list"><span class="weak-empty">— no weak spots yet —</span></div>
  </div>
</div>
<script>
/* ============================================================
   AIRCRAFT DATA - Wikipedia article title is used to fetch real photos
   via Wikipedia REST API (CORS-enabled, returns infobox thumbnail)
   ============================================================ */

const AIRCRAFT = [
  {
    icao: 'B738', name: 'Boeing 737-800', mfr: 'Boeing',
    wiki: 'Boeing_737_Next_Generation',
    wake: 'M', engines: '2× CFM56-7B turbofan', enginesCount: 2,
    cruise: '447 kt (M0.785)', mmo: 'M0.82', vne: '340 kt IAS',
    stall: '~108 kt (clean, MTOW)', ceiling: 'FL410',
    mtow: '79 t', length: '39.5 m', wingspan: '35.8 m',
    range: '5,400 km', pax: '~189',
    role: 'Workhorse narrowbody, short/medium-haul',
    operators: 'Ryanair, SmartWings, Jet2, Delta, AA, KLM, TUI fly',
    accept: ['B738','737-800','737 800','737800','737','b737','737NG'],
    hints: [

/* Projection bounds. Height is computed so longitude/latitude don't get
   stretched — uses cos(latMid) correction (equirectangular). */
const MAP_PROJ = (function(){
  const latMin=47.60, latMax=49.70, lonMin=16.75, lonMax=22.70, w=1000;
  const cosLat = Math.cos(((latMin+latMax)/2) * Math.PI/180);
  const h = w * ((latMax-latMin)/(lonMax-lonMin)) / cosLat;
  return { latMin, latMax, lonMin, lonMax, w, h };
})();
function projX(lon){ return ( (lon - MAP_PROJ.lonMin) / (MAP_PROJ.lonMax - MAP_PROJ.lonMin) ) * MAP_PROJ.w; }
function projY(lat){ return ( 1 - (lat - MAP_PROJ.latMin) / (MAP_PROJ.latMax - MAP_PROJ.latMin) ) * MAP_PROJ.h; }

/* Bratislava CTA sector boundaries (West / Central / East).
   Approximated from the official FRA chart — straight polylines north→south
   as [lat, lon]. Easy to nudge: tweak these to move dividers. */
const SECTOR_LINES = {
  // WEST | CENTRAL  (≈ lon 18.9, slight eastward tilt going south)
  wc: [[49.40, 18.90],[48.80, 18.93],[48.30, 18.98],[47.70, 19.03]],
  // CENTRAL | EAST  (≈ lon 20.0)
  ce: [[49.40, 20.00],[48.80, 20.00],[48.30, 20.04],[48.00, 20.08]],
};
function lonOnLine(line, lat){
  if (lat >= line[0][0]) return line[0][1];
  if (lat <= line[line.length-1][0]) return line[line.length-1][1];
  for (let i=0;i<line.length-1;i++){
    const [la1,lo1] = line[i], [la2,lo2] = line[i+1];
    if (lat <= la1 && lat >= la2){
      const t = (lat - la1) / (la2 - la1);
      return lo1 + t * (lo2 - lo1);
    }
  }
  return line[line.length-1][1];
}
function sectorOf(lat, lon){
  if (lon < lonOnLine(SECTOR_LINES.wc, lat)) return 'W';
  if (lon < lonOnLine(SECTOR_LINES.ce, lat)) return 'C';
  return 'E';
}
const SECTOR_NAMES = { W:'WEST', C:'CENTRAL', E:'EAST' };
const SECTOR_LONG  = { W:'Bratislava CTA — Sector WEST', C:'Bratislava CTA — Sector CENTRAL', E:'Bratislava CTA — Sector EAST' };
WAYPOINTS.forEach(w => { w.sec = sectorOf(w.lat, w.lon); });

/* ============================================================
   HELPERS - shuffle, normalize, levenshtein, matching
   ============================================================ */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function normalize(s) {
  return String(s).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^\w]/g, '').trim();
}
function lev(a, b) {
  if (a === b) return 0;
  const m = a.length, n = b.length;
  if (!m) return n; if (!n) return m;
  const dp = Array.from({length:m+1}, () => new Array(n+1).fill(0));
  for (let i=0;i<=m;i++) dp[i][0]=i;
  for (let j=0;j<=n;j++) dp[0][j]=j;
  for (let i=1;i<=m;i++) for (let j=1;j<=n;j++) {
    const cost = a[i-1]===b[j-1]?0:1;
    dp[i][j] = Math.min(dp[i-1][j]+1, dp[i][j-1]+1, dp[i-1][j-1]+cost);
  }
  return dp[m][n];
}
function matches(userInput, candidates) {
  const u = normalize(userInput);
  if (!u) return false;
  for (const c of candidates) {
    const n = normalize(c);
    if (!n) continue;
    if (u === n) return true;
    const tol = n.length >= 10 ? 2 : (n.length >= 5 ? 1 : 0);
    if (lev(u, n) <= tol) return true;
  }
  return false;
}

/* ============================================================
   QUESTION BUILDERS
   ============================================================ */
function buildAircraftQuestions() {
  let pool = AIRCRAFT;
  if (state.filters.wake !== 'all') pool = pool.filter(a => a.wake === state.filters.wake);
  return shuffle(pool).map(a => ({ type: 'aircraft', id: 'AC_' + a.icao, data: a, accept: a.accept }));
}
function buildAirportQuestions() {
  let pool = AIRPORTS;
  if (state.filters.airportCat !== 'all') pool = pool.filter(a => a.cat === state.filters.airportCat);
  const list = [];
  pool.forEach(ap => {
    list.push({ type: 'airport', subtype: 'icao-to-city', id: 'AP_I2C_' + ap.icao, data: ap,
      accept: [ap.city] });
    list.push({ type: 'airport', subtype: 'city-to-icao', id: 'AP_C2I_' + ap.icao, data: ap,
      accept: [ap.icao] });
  });
  return shuffle(list);
}
function buildCallsignQuestions() {
  let pool = CALLSIGNS;
  if (state.filters.callsignCat !== 'all') pool = pool.filter(c => c.cat === state.filters.callsignCat);
  const list = [];
  pool.forEach(cs => {
    list.push({ type: 'callsign', subtype: 'icao-to-call', id: 'CS_I2C_' + cs.icao, data: cs,
      accept: [cs.call, cs.call.replace(/\s/g,'')] });
    list.push({ type: 'callsign', subtype: 'call-to-icao', id: 'CS_C2I_' + cs.icao, data: cs,
      accept: [cs.icao] });
  });
  return shuffle(list);
}
function filterBySector(pool) {
  const g = state.filters.wpGrp;
  if (g === 'all' || !g) return pool;
  if (g === 'NAV') return pool.filter(w => w.kind === 'nav');
  // W / C / E sector codes
  return pool.filter(w => w.sec === g);
}
function buildWaypointQuestions() {
  const pool = filterBySector(WAYPOINTS);
  return shuffle(pool).map(w => ({ type: 'waypoint', id: 'WP_' + w.name, data: w, accept: [w.name] }));
}
function buildQueue() {
  switch(state.mode) {
    case 'aircraft': return buildAircraftQuestions();
    case 'airport':  return buildAirportQuestions();
    case 'callsign': return buildCallsignQuestions();
    case 'waypoint': return buildWaypointQuestions();
  }
}

/* Pick the candidate dots shown for a given target.
   EASY = target + 4 nearest neighbours (5 total).
   HARD = every point currently in the filtered pool. */
function waypointCandidates(target) {
  if (state.filters.wpDiff === 'hard') {
    return filterBySector(WAYPOINTS);
  }
  // easy: nearest 4 by projected distance + target (distractors from full map = realistic)
  const others = WAYPOINTS.filter(w => w.name !== target.name).map(w => {
    const dx = projX(w.lon) - projX(target.lon);
    const dy = projY(w.lat) - projY(target.lat);
    return { w, d: dx*dx + dy*dy };
  }).sort((a,b) => a.d - b.d).slice(0, 4).map(o => o.w);
  return shuffle([target, ...others]);
}

/* ============================================================
   HINT GENERATORS - progressive hints for each question type
   ============================================================ */
function generateHints(q) {
  if (q.type === 'aircraft') return q.data.hints.slice();
  if (q.type === 'airport') {
    const ap = q.data;
    if (q.subtype === 'icao-to-city') {
      return [
        `Krajina: ${ap.country}`,
        `${ap.hint}`,
        `Začína na "${ap.city.charAt(0)}", ${ap.city.length} písmen.`,
        `Letisko: ${ap.name}`,
      ];
    } else {
      const firstLetter = ap.icao.charAt(0);
      const regionMap = { L: 'južná/stredná Európa', E: 'severná/západná Európa', K: 'USA', U: 'CIS/Ukrajina', O: 'Stredný východ' };
      const region = regionMap[firstLetter] || '';
      return [
        `Krajina: ${ap.country}${region ? ' (' + region + ')' : ''}`,
        `${ap.hint}`,
        `Začína na "${ap.icao.substring(0,2)}".`,
        `Posledné dve: "${ap.icao.substring(2,4)}".`,
      ];
    }
  }
  if (q.type === 'callsign') {
    const cs = q.data;
    if (q.subtype === 'icao-to-call') {
      return [
        `Aerolinka: ${cs.airline}`,
        `Krajina: ${cs.country} · Typ: ${cs.type}`,
        `${cs.hint}`,
        `Callsign začína na "${cs.call.charAt(0)}".`,
      ];
    } else {
      return [
        `Aerolinka: ${cs.airline}`,
        `Krajina: ${cs.country} · Typ: ${cs.type}`,
        `${cs.hint}`,
        `ICAO začína na "${cs.icao.charAt(0)}".`,
      ];
    }
  }
  return [];
}

/* ============================================================
   PHOTO LOADER - Wikipedia REST API summary endpoint
   Returns the infobox thumbnail (CORS-enabled, stable)
   ============================================================ */
const photoCache = {};
async function loadAircraftPhoto(ac) {
  const box = document.getElementById('ac-photo');
  if (!box) return;
  const setImg = (src) => {
    box.innerHTML = `
      <img src="${src}" alt="aircraft" onerror="this.parentElement.innerHTML='<div class=&quot;photo-loading&quot;>IMAGERY UNAVAILABLE</div>'">
      <div class="photo-corner"><span>▲ INBOUND TRAFFIC</span><span>VIS REC</span></div>
    `;
  };
  if (photoCache[ac.icao]) { setImg(photoCache[ac.icao]); return; }
  try {
    const url = `https://en.wikipedia.org/api/rest_v1/page/summary/${ac.wiki}`;
    const r = await fetch(url, { headers: { 'Accept': 'application/json' } });
    if (!r.ok) throw new Error('http ' + r.status);
    const d = await r.json();
    const src = (d.originalimage && d.originalimage.source) || (d.thumbnail && d.thumbnail.source);
    if (!src) throw new Error('no image in summary');
    photoCache[ac.icao] = src;
    setImg(src);
  } catch (e) {
    box.innerHTML = `<div class="photo-loading">IMAGERY UNAVAILABLE<br><span style="font-size:9px;color:var(--text-faint)">${ac.wiki}</span></div>`;
  }
}

/* ============================================================
   MAP / WAYPOINT QUESTION RENDERER
   ============================================================ */
/* shared map base: border path + city anchors (used by quiz & study renderers) */
function mapBaseParts() {
  const firPath = smoothClosedPath(FIR_OUTLINE.map(([lo,la]) => [projX(lo), projY(la)]));
  const cities = WP_CITIES.map(c => {
    const x = projX(c.lon), y = projY(c.lat);
    return `<g>
      <path class="wp-city" d="M ${x},${y-6} L ${x+5},${y} L ${x},${y+6} L ${x-5},${y} Z"></path>
      <text class="wp-anchor-label" x="${x+9}" y="${y+3}">${c.name}</text>
    </g>`;
  }).join('');
  return { firPath, cities };
}

function buildMapSVG(target, candidates, opts) {
  opts = opts || {};
  const P = MAP_PROJ;
  const { firPath, cities } = mapBaseParts();

  // dots
  let dots = candidates.map(c => {
    const x = projX(c.lon).toFixed(1), y = projY(c.lat).toFixed(1);
    const isNav = c.kind === 'nav';
    if (isNav) {
      // navaid = hexagon marker to show it's a facility, not a fix
      const r = 7;
      const hex = [];
      for (let i=0;i<6;i++){ const a=Math.PI/6 + i*Math.PI/3; hex.push(`${(+x+r*Math.cos(a)).toFixed(1)},${(+y+r*Math.sin(a)).toFixed(1)}`); }
      return `<polygon class="wp-dot nav cand wp-hit" data-name="${c.name}" points="${hex.join(' ')}"></polygon>
              <circle class="wp-hit" data-name="${c.name}" cx="${x}" cy="${y}" r="16" fill="transparent"></circle>`;
    }
    return `<circle class="wp-dot cand wp-hit" data-name="${c.name}" cx="${x}" cy="${y}" r="6"></circle>
            <circle class="wp-hit" data-name="${c.name}" cx="${x}" cy="${y}" r="16" fill="transparent"></circle>`;
  }).join('');

  return `<svg viewBox="0 0 ${P.w} ${P.h.toFixed(0)}" xmlns="http://www.w3.org/2000/svg" id="map-svg">
    <rect x="0" y="0" width="${P.w}" height="${P.h.toFixed(0)}" fill="#fbfdfc"></rect>
    <path d="${firPath}" fill="#eef6f0" stroke="var(--border-bright)" stroke-width="1.5"></path>
    ${cities}
    ${dots}
  </svg>`;
}

/* Catmull-Rom spline through points -> smooth closed SVG path (cubic Béziers).
   Makes the hand-placed border vertices render as soft curves, not straight chords. */
function smoothClosedPath(pts, k) {
  k = (k == null) ? 0.5 : k; // tension
  const n = pts.length;
  if (n < 3) return 'M ' + pts.map(p => p[0].toFixed(1)+','+p[1].toFixed(1)).join(' L ') + ' Z';
  let d = `M ${pts[0][0].toFixed(1)},${pts[0][1].toFixed(1)}`;
  for (let i = 0; i < n; i++) {
    const p0 = pts[(i - 1 + n) % n];
    const p1 = pts[i];
    const p2 = pts[(i + 1) % n];
    const p3 = pts[(i + 2) % n];
    const c1x = p1[0] + (p2[0] - p0[0]) * k / 3;
    const c1y = p1[1] + (p2[1] - p0[1]) * k / 3;
    const c2x = p2[0] - (p3[0] - p1[0]) * k / 3;
    const c2y = p2[1] - (p3[1] - p1[1]) * k / 3;
    d += ` C ${c1x.toFixed(1)},${c1y.toFixed(1)} ${c2x.toFixed(1)},${c2y.toFixed(1)} ${p2[0].toFixed(1)},${p2[1].toFixed(1)}`;
  }
  return d + ' Z';
}

/* ============================================================
   STUDY / EXPLORE MODE — free interactive map, no scoring
   ============================================================ */
function buildStudySVG(points, selName) {
  const P = MAP_PROJ;
  const { firPath, cities } = mapBaseParts();

  // collision-nudged label placement so names don't pile up
  const placed = [];
  const collides = (lx, ly) => placed.some(p => Math.abs(p.x - lx) < 30 && Math.abs(p.y - ly) < 9);

  const dots = [], labels = [];
  points.forEach(c => {
    const x = projX(c.lon), y = projY(c.lat);
    const xs = x.toFixed(1), ys = y.toFixed(1);
    const sCls = 's-' + (c.sec || 'W');
    const selCls = (c.name === selName) ? ' s-sel' : '';
    if (c.kind === 'nav') {
      const r = 7, hex = [];
      for (let i=0;i<6;i++){ const a=Math.PI/6 + i*Math.PI/3; hex.push(`${(x+r*Math.cos(a)).toFixed(1)},${(y+r*Math.sin(a)).toFixed(1)}`); }
      dots.push(`<polygon class="wp-dot ${sCls}${selCls} wp-hit" data-name="${c.name}" points="${hex.join(' ')}"></polygon>`);
    } else {
      dots.push(`<circle class="wp-dot ${sCls}${selCls} wp-hit" data-name="${c.name}" cx="${xs}" cy="${ys}" r="5"></circle>`);
    }
    dots.push(`<circle class="wp-hit" data-name="${c.name}" cx="${xs}" cy="${ys}" r="14" fill="transparent"></circle>`);
    // place label
    const tries = [[x+8,y-5,'start'],[x+8,y+11,'start'],[x-8,y-5,'end'],[x-8,y+11,'end'],[x,y-11,'middle'],[x,y+16,'middle']];
    let ch = tries[0];
    for (const t of tries) { if (!collides(t[0], t[1])) { ch = t; break; } }
    placed.push({ x: ch[0], y: ch[1] });
    labels.push(`<text class="wp-label-study" x="${ch[0].toFixed(1)}" y="${ch[1].toFixed(1)}" text-anchor="${ch[2]}">${c.name}</text>`);
  });

  return `<svg viewBox="0 0 ${P.w} ${P.h.toFixed(0)}" xmlns="http://www.w3.org/2000/svg" id="map-svg">
    <rect x="0" y="0" width="${P.w}" height="${P.h.toFixed(0)}" fill="#fbfdfc"></rect>
    <path d="${firPath}" fill="#eef6f0" stroke="var(--border-bright)" stroke-width="1.5"></path>
    ${cities}
    ${dots.join('')}
    ${labels.join('')}
  </svg>`;
}

function revealOtherPoints(svg, target, cands, pickedName) {
  const NS = 'http://www.w3.org/2000/svg';
  // Only the OTHER candidates that were on screen for guessing (≈4 in easy mode).
  // The correct one (green) and the wrong pick (red) are already coloured/labelled.
  const others = cands.filter(c => c.name !== target.name && c.name !== pickedName);

  // collision-aware label placement: track occupied boxes (incl. the correct label)
  const placed = [{ x: projX(target.lon)+9, y: projY(target.lat)-8 }];
  const collides = (lx, ly) => placed.some(p => Math.abs(p.x - lx) < 34 && Math.abs(p.y - ly) < 11);

  others.forEach(w => {
    const x = projX(w.lon), y = projY(w.lat);
    // recolour the candidate dot to black so it's clearly "one of the others"
    const d = svg.querySelector('.wp-dot[data-name="'+w.name+'"]');
    if (d) { d.classList.remove('cand'); d.classList.remove('nav'); d.classList.add('other'); }

    // try several offsets so labels stay readable and don't overlap each other
    const tries = [
      [x+9, y-6, 'start'], [x+9, y+12, 'start'],
      [x-9, y-6, 'end'],   [x-9, y+12, 'end'],
      [x, y-12, 'middle'], [x, y+18, 'middle'],
    ];
    let chosen = tries[0];
    for (const t of tries) { if (!collides(t[0], t[1])) { chosen = t; break; } }
    placed.push({ x: chosen[0], y: chosen[1] });

    const t = document.createElementNS(NS,'text');
    t.setAttribute('class','wp-label-other');
    t.setAttribute('x', chosen[0].toFixed(1));
    t.setAttribute('y', chosen[1].toFixed(1));
    t.setAttribute('text-anchor', chosen[2]);
    t.textContent = w.name;
    svg.appendChild(t);
  });
}

function onWaypointPick(pickedName, target, svg, cands) {
  // lock further clicks
  svg.querySelectorAll('.wp-hit').forEach(el => { el.style.pointerEvents = 'none'; el.style.cursor = 'default'; });
  const ok = pickedName === target.name;
  const q = state.current;

  // colour the picked dot
  const pickedDot = svg.querySelector('.wp-dot[data-name="'+pickedName+'"]');
  if (pickedDot) { pickedDot.classList.remove('cand'); pickedDot.classList.add(ok ? 'correct' : 'wrong'); }
  // always highlight correct one + label it
  const correctDot = svg.querySelector('.wp-dot[data-name="'+target.name+'"]');
  if (correctDot) {
    correctDot.classList.remove('cand');
    correctDot.classList.add('reveal-correct');
    const cx = correctDot.getAttribute('cx') || (projX(target.lon).toFixed(1));
    const cy = correctDot.getAttribute('cy') || (projY(target.lat).toFixed(1));
    const lbl = document.createElementNS('http://www.w3.org/2000/svg','text');
    lbl.setAttribute('class','wp-label-reveal');
    lbl.setAttribute('x', (+cx + 9)); lbl.setAttribute('y', (+cy - 8));
    lbl.textContent = target.name;
    svg.appendChild(lbl);
  }
  // reveal every other FRA point in black so the user learns the rest of the map
  revealOtherPoints(svg, target, cands, pickedName);

  // scoring (reuse global counters)
  if (ok) {
    state.correct++; state.streak++;
    if (state.streak > state.bestStreak) state.bestStreak = state.streak;
  } else {
    state.wrong++; state.streak = 0;
    state.mistakes[q.id] = (state.mistakes[q.id] || 0) + 1;
  }
  renderStats(); renderWeak();

  const fb = document.getElementById('feedback');
  const typeFull = { A:'Arrival Connection', D:'Departure Connection', E:'Horizontal Entry', I:'Intermediate', X:'Horizontal Exit' };
  const typeList = (target.type||'').split('').filter(c=>typeFull[c]).map(c=>typeFull[c]).join(', ') || '—';
  const grpName = { SEVER:'Sever (PL / Warszawa FIR)', ZAPAD:'Západ (CZ-AT / Praha FIR)', VYCHOD:'Východ (UA / Lviv FIR)', JUH:'Juh (HU / Budapest FIR)', STRED:'Vnútro FIR', NAV:'Navigačné zariadenie' };
  const secTxt = target.sec ? `<strong>${SECTOR_NAMES[target.sec]}</strong>` : '—';

  let banner = ok ? `✓ <strong>SPRÁVNE</strong>` : `✗ <strong>ZLE</strong> · klikol si: <span class="answer">${pickedName}</span>`;
  fb.className = 'feedback show ' + (ok ? 'ok' : 'no');
  fb.innerHTML = `
    <div class="feedback-banner">
      <span>${banner}</span>
      <button class="btn" id="next-btn">ĎALŠÍ ▶</button>
    </div>
    <div class="reveal">
      <div class="reveal-title">${target.name}</div>
      <div class="reveal-sub">${target.kind==='nav' ? (target.nav||'NAVIGAČNÉ ZARIADENIE') : 'FRA SIGNIFICANT POINT'}</div>
      <div class="reveal-grid">
        <div class="item"><span class="item-label">TYP BODU</span><span class="item-val"><strong>${target.type||'—'}</strong> ${typeList}</span></div>
        <div class="item"><span class="item-label">SEKTOR</span><span class="item-val">${secTxt}</span></div>
        <div class="item"><span class="item-label">OBLASŤ</span><span class="item-val">${grpName[target.grp]||target.grp}</span></div>
        <div class="item"><span class="item-label">LAT</span><span class="item-val">${fmtLat(target.lat)}</span></div>
        <div class="item"><span class="item-label">LON</span><span class="item-val">${fmtLon(target.lon)}</span></div>
      </div>
    </div>
  `;
  setTimeout(() => {
    const nb = document.getElementById('next-btn');
    if (nb) { nb.focus(); nb.onclick = nextQuestion; }
    document.addEventListener('keydown', onEnterNext, { once: true });
  }, 50);
}

function fmtLat(d){ const h=d>=0?'N':'S'; d=Math.abs(d); const deg=Math.floor(d); const m=Math.floor((d-deg)*60); const s=Math.round(((d-deg)*60-m)*60); return `${deg}°${String(m).padStart(2,'0')}'${String(s).padStart(2,'0')}"${h}`; }
function fmtLon(d){ const h=d>=0?'E':'W'; d=Math.abs(d); const deg=Math.floor(d); const m=Math.floor((d-deg)*60); const s=Math.round(((d-deg)*60-m)*60); return `${String(deg).padStart(3,'0')}°${String(m).padStart(2,'0')}'${String(s).padStart(2,'0')}"${h}`; }

function useHint() {
  const q = state.current;
  const hints = generateHints(q);
  if (state.hintsUsed >= hints.length) return;
  const row = document.getElementById('hint-row');
  const txt = row.querySelector('.hint-text');
  row.classList.remove('empty');
  txt.innerHTML = `<strong style="color:var(--amber)">[${state.hintsUsed + 1}/${hints.length}]</strong> ${hints[state.hintsUsed]}`;
  state.hintsUsed++;
  const btn = document.getElementById('btn-hint');
  if (state.hintsUsed >= hints.length) {
    btn.disabled = true;
    btn.textContent = 'NO MORE HINTS';
  } else {
    btn.textContent = `? HINT (${hints.length - state.hintsUsed} LEFT)`;
  }
}

function renderWeak() {
  const el = document.getElementById('weak-list');
  const items = Object.entries(state.mistakes)
    .filter(([_, n]) => n >= 3).sort((a,b) => b[1] - a[1]);
  if (!items.length) {
    el.innerHTML = '<span class="weak-empty">— no weak spots yet —</span>';
    return;
  }
  el.innerHTML = items.map(([id, n]) => `<span class="weak-item">${labelForId(id)} · ×${n}</span>`).join('');
}

function labelForId(id) {
  if (id.startsWith('AC_')) {
    const ac = AIRCRAFT.find(a => 'AC_' + a.icao === id);
    return ac ? ac.icao : id;
  }
  if (id.startsWith('AP_I2C_')) {
    const ic = id.slice(7);
    const ap = AIRPORTS.find(a => a.icao === ic);
    return ap ? `${ap.icao}→${ap.city}` : id;
  }
  if (id.startsWith('AP_C2I_')) {
    const ic = id.slice(7);
    const ap = AIRPORTS.find(a => a.icao === ic);
    return ap ? `${ap.city}→${ap.icao}` : id;
  }
  if (id.startsWith('CS_I2C_')) {
    const ic = id.slice(7);
    const cs = CALLSIGNS.find(c => c.icao === ic);
    return cs ? `${cs.icao}→${cs.call}` : id;
  }
  if (id.startsWith('CS_C2I_')) {
    const ic = id.slice(7);
    const cs = CALLSIGNS.find(c => c.icao === ic);
    return cs ? `"${cs.call}"→${cs.icao}` : id;
  }
  return id;
}

/* ============================================================
   SUBMIT FLOW
   ============================================================ */
function submitAnswer() {
  const input = document.getElementById('answer');
  if (!input || input.disabled) return;
  const val = input.value;
  if (!val.trim()) return;

  const q = state.current;
  const ok = matches(val, q.accept);
  const fb = document.getElementById('feedback');

  if (ok) {
    state.correct++;
    state.streak++;
    if (state.streak > state.bestStreak) state.bestStreak = state.streak;
  } else {
    state.wrong++;
    state.streak = 0;
    state.mistakes[q.id] = (state.mistakes[q.id] || 0) + 1;
  }
  renderStats();
  renderWeak();

  input.disabled = true;
  const sb = document.getElementById('submit-btn');
  sb.disabled = true; sb.style.opacity = '0.4';
  const hb = document.getElementById('btn-hint'); if (hb) hb.disabled = true;

  let bannerText;
  if (ok) bannerText = `✓ <strong>CORRECT</strong>`;
  else bannerText = `✗ <strong>WRONG</strong> · YOUR ANSWER: <span class="answer">${val.toUpperCase()}</span>`;

  fb.className = 'feedback show ' + (ok ? 'ok' : 'no');
  fb.innerHTML = `
    <div class="feedback-banner">
      <span>${bannerText}</span>
      <button class="btn" id="next-btn">NEXT ▶</button>
    </div>
    ${renderReveal(q)}
  `;

  setTimeout(() => {
    const nb = document.getElementById('next-btn');
    if (nb) { nb.focus(); nb.onclick = nextQuestion; }
    document.addEventListener('keydown', onEnterNext, { once: true });
  }, 50);
}

function onEnterNext(e) {
  if (e.key === 'Enter') { e.preventDefault(); nextQuestion(); }
}

function nextQuestion() {
  state.index++;
  state.current = state.queue[state.index] || null;
  renderQuestion();
}

function startMode(mode) {
  state.mode = mode;
  state.queue = buildQueue();
  state.index = 0;
  state.total = state.queue.length;
  state.correct = 0; state.wrong = 0;
  state.streak = 0; state.bestStreak = 0;
  state.current = state.queue[0] || null;
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.mode === mode);
  });
  renderFilters();
  renderStats();
  renderQuestion();
}

/* CLOCK */
function tickClock() {
  const d = new Date();
  const h = String(d.getUTCHours()).padStart(2,'0');
  const m = String(d.getUTCMinutes()).padStart(2,'0');
  const s = String(d.getUTCSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent = `${h}:${m}:${s} UTC`;
}
setInterval(tickClock, 1000); tickClock();

document.querySelectorAll('.tab').forEach(t => { t.onclick = () => startMode(t.dataset.mode); });
document.getElementById('btn-skip').onclick = () => {
  if (state.mode === 'waypoint' && state.filters.wpMode === 'study') return; // no skipping in study
  if (!state.current) return;
  state.mistakes[state.current.id] = (state.mistakes[state.current.id] || 0) + 1;
  state.streak = 0;
  renderStats(); renderWeak();
  nextQuestion();
};
document.getElementById('btn-reset').onclick = () => startMode(state.mode);

startMode('aircraft');
</script>
</body>
</html>
